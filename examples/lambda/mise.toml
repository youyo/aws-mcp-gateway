[env]
# Default values — override in .env or shell environment
INSTANCE_NAME = "amg"
AWS_REGION    = "ap-northeast-1"
VERSION = "0.5.3"
LAMBDA_ARCH   = "arm64"
# Load secrets from .env (ROLE_ARN etc.)
_.file = ".env"

# ── Build & Package ───────────────────────────────────────────────────────────

[tasks.download]
description = "Download aws-mcp-gateway binary from GitHub Release"
run = """
ARCHIVE="aws-mcp-gateway_${VERSION}_Linux_${LAMBDA_ARCH}.tar.gz"
curl -fsSL -o "${ARCHIVE}" \
  "https://github.com/youyo/aws-mcp-gateway/releases/download/v${VERSION}/${ARCHIVE}"
tar xzf "${ARCHIVE}" aws-mcp-gateway
rm -f "${ARCHIVE}"
"""

[tasks.package]
description = "Rename binary to bootstrap and create function.zip"
depends = ["download"]
run = """
mv aws-mcp-gateway bootstrap
chmod +x bootstrap
zip -j function.zip bootstrap
"""

[tasks.clean]
description = "Remove packaging artifacts"
run = "rm -f aws-mcp-gateway bootstrap function.zip"

# ── Deploy ────────────────────────────────────────────────────────────────────

[tasks."deploy:init"]
description = "Initial deploy (Phase 1): Lambda function without Function URL"
depends = ["package"]
run = """
: "${ROLE_ARN:?set ROLE_ARN in .env}"
ROLE_ARN="${ROLE_ARN}" \
lambroll deploy \
  --function function.json \
  --src function.zip
"""

[tasks."deploy:setup-url"]
description = "Phase 2: Create Function URL, update EXTERNAL_URL in SSM, re-deploy"
run = """
# Create Function URL (idempotent — skip if already exists)
aws lambda create-function-url-config \
  --function-name "${INSTANCE_NAME}" \
  --auth-type NONE \
  --invoke-mode RESPONSE_STREAM \
  --region "${AWS_REGION}" 2>/dev/null || true

FUNCTION_URL=$(aws lambda get-function-url-config \
  --function-name "${INSTANCE_NAME}" \
  --region "${AWS_REGION}" \
  --query 'FunctionUrl' --output text)

echo "Function URL: ${FUNCTION_URL}"

# Update EXTERNAL_URL in SSM (strip trailing slash)
aws ssm put-parameter \
  --region "${AWS_REGION}" \
  --name "/${INSTANCE_NAME}/EXTERNAL_URL" \
  --value "${FUNCTION_URL%/}" \
  --type SecureString \
  --overwrite

echo "Updated /${INSTANCE_NAME}/EXTERNAL_URL -> ${FUNCTION_URL%/}"
echo ""
echo "Next: set redirect URI in Entra ID:"
echo "  ${FUNCTION_URL%/}/callback"
echo ""
echo "Then re-deploy:"
echo "  mise run deploy"
"""

[tasks.deploy]
description = "Deploy (subsequent): download, package, lambroll deploy with Function URL"
depends = ["package"]
run = """
: "${ROLE_ARN:?set ROLE_ARN in .env}"
ROLE_ARN="${ROLE_ARN}" \
lambroll deploy \
  --function function.json \
  --function-url function_url.json \
  --src function.zip
"""

# ── Infrastructure Setup (one-time) ──────────────────────────────────────────

[tasks."iam:create"]
description = "Create Lambda execution role with required policies"
run = """
ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
ROLE_NAME="${INSTANCE_NAME}-lambda-role"

# Create role
aws iam create-role \
  --role-name "${ROLE_NAME}" \
  --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'

# Basic Lambda permissions (CloudWatch Logs)
aws iam attach-role-policy \
  --role-name "${ROLE_NAME}" \
  --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

# AWS MCP access (ReadOnly — adjust as needed)
aws iam attach-role-policy \
  --role-name "${ROLE_NAME}" \
  --policy-arn arn:aws:iam::aws:policy/ReadOnlyAccess

# DynamoDB session store
aws iam put-role-policy \
  --role-name "${ROLE_NAME}" \
  --policy-name dynamodb-session-store \
  --policy-document "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"dynamodb:GetItem\",\"dynamodb:PutItem\",\"dynamodb:DeleteItem\"],\"Resource\":\"arn:aws:dynamodb:${AWS_REGION}:${ACCOUNT_ID}:table/${INSTANCE_NAME}\"}]}"

ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
echo "Role created: ${ROLE_ARN}"

# Append ROLE_ARN to .env (create if not exists)
if grep -q "^ROLE_ARN=" .env 2>/dev/null; then
  sed -i '' "s|^ROLE_ARN=.*|ROLE_ARN=${ROLE_ARN}|" .env
else
  echo "ROLE_ARN=${ROLE_ARN}" >> .env
fi
echo "Written to .env: ROLE_ARN=${ROLE_ARN}"
"""

[tasks."iam:delete"]
description = "Delete Lambda execution role and all attached policies (destructive)"
run = """
ROLE_NAME="${INSTANCE_NAME}-lambda-role"

aws iam detach-role-policy \
  --role-name "${ROLE_NAME}" \
  --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true

aws iam detach-role-policy \
  --role-name "${ROLE_NAME}" \
  --policy-arn arn:aws:iam::aws:policy/ReadOnlyAccess 2>/dev/null || true

aws iam delete-role-policy \
  --role-name "${ROLE_NAME}" \
  --policy-name dynamodb-session-store 2>/dev/null || true

aws iam delete-role --role-name "${ROLE_NAME}"
echo "Role ${ROLE_NAME} deleted."
"""

[tasks."dynamodb:create"]
description = "Create DynamoDB session store table with TTL"
run = """
aws dynamodb create-table \
  --region "${AWS_REGION}" \
  --table-name "${INSTANCE_NAME}" \
  --attribute-definitions AttributeName=pk,AttributeType=S \
  --key-schema AttributeName=pk,KeyType=HASH \
  --billing-mode PAY_PER_REQUEST
aws dynamodb wait table-exists \
  --region "${AWS_REGION}" \
  --table-name "${INSTANCE_NAME}"
aws dynamodb update-time-to-live \
  --region "${AWS_REGION}" \
  --table-name "${INSTANCE_NAME}" \
  --time-to-live-specification "Enabled=true,AttributeName=ttl"
echo "Table ${INSTANCE_NAME} created in ${AWS_REGION} with TTL enabled."
"""

[tasks."dynamodb:delete"]
description = "Delete DynamoDB session store table (destructive)"
run = """
aws dynamodb delete-table \
  --region "${AWS_REGION}" \
  --table-name "${INSTANCE_NAME}"
echo "Table ${INSTANCE_NAME} deletion requested."
"""

# ── Convenience ───────────────────────────────────────────────────────────────

[tasks."ssm:init"]
description = "Create required SSM parameters (fill in OIDC values manually after)"
run = """
echo "Creating SSM parameters for INSTANCE_NAME=${INSTANCE_NAME} in ${AWS_REGION}..."

# Placeholder — update to real Function URL after deploy:setup-url
aws ssm put-parameter --region "${AWS_REGION}" --type SecureString \
  --name "/${INSTANCE_NAME}/EXTERNAL_URL" --value "https://placeholder.invalid" \
  --overwrite 2>/dev/null || \
aws ssm put-parameter --region "${AWS_REGION}" --type SecureString \
  --name "/${INSTANCE_NAME}/EXTERNAL_URL" --value "https://placeholder.invalid"

# ASSUME_ROLE_ARN: space = disabled (TrimSpace in app treats it as empty)
aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/ASSUME_ROLE_ARN" --value " " \
  --overwrite 2>/dev/null || \
aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/ASSUME_ROLE_ARN" --value " "

aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/DYNAMODB_TABLE" --value "${INSTANCE_NAME}" \
  --overwrite 2>/dev/null || \
aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/DYNAMODB_TABLE" --value "${INSTANCE_NAME}"

aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/DYNAMODB_REGION" --value "${AWS_REGION}" \
  --overwrite 2>/dev/null || \
aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/DYNAMODB_REGION" --value "${AWS_REGION}"

aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/AWS_MCP_REGION" --value "us-east-1" \
  --overwrite 2>/dev/null || \
aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/AWS_MCP_REGION" --value "us-east-1"

aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/TARGET_AWS_REGION" --value "${AWS_REGION}" \
  --overwrite 2>/dev/null || \
aws ssm put-parameter --region "${AWS_REGION}" --type String \
  --name "/${INSTANCE_NAME}/TARGET_AWS_REGION" --value "${AWS_REGION}"

echo ""
echo "Done. Set these manually in AWS Console or SSM:"
echo "  /${INSTANCE_NAME}/OIDC_ISSUER      (e.g. https://login.microsoftonline.com/<tenant-id>/v2.0)"
echo "  /${INSTANCE_NAME}/OIDC_CLIENT_ID"
echo "  /${INSTANCE_NAME}/OIDC_CLIENT_SECRET"
echo "  /${INSTANCE_NAME}/COOKIE_SECRET    (run: openssl rand -hex 32)"
"""

[tasks.setup]
description = "One-time infrastructure setup: IAM role + DynamoDB (then set ROLE_ARN in .env)"
depends = ["iam:create", "dynamodb:create"]

[tasks.teardown]
description = "Destroy all infrastructure for this INSTANCE_NAME (destructive)"
depends = ["dynamodb:delete", "iam:delete"]
