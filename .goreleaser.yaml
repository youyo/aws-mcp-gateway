# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: aws-mcp-gateway

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: aws-mcp-gateway
    main: .
    binary: aws-mcp-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{incpatch .Version}}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: youyo
    name: aws-mcp-gateway
  prerelease: auto
